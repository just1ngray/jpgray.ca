<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/npm/twemoji@11.3.0/2/svg/1f454.svg" />
  <title>Justin's Page</title>

  <!-- tailwindcss -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-my-dark: #070639;
      --color-my-middle: #122351;
      --color-my-highlight: #243668;
      --color-my-offwhite: #e7edfb;
    }
  </style>
  <!-- note: svg icons are from https://icons.getbootstrap.com/ -->

  <!-- development only: reload page every 1s -->
  <!-- <meta http-equiv="refresh" content="1"> -->
</head>
<body>
  <div class="w-screen min-h-screen
              bg-radial-[at_50%_75%] from-my-highlight via-my-middle to-my-dark to-90%
              flex flex-col justify-center items-center
              text-my-offwhite font-mono
             ">
    <div class="rounded shadow-2xl/30 p-4 bg-my-highlight flex flex-col gap-2 max-w-166">
      <h1 class="text-2xl mb-2"># Hi, I'm Justin Gray</h1>

      <p>Welcome to my landing page! I am a software developer from Halifax, NS, Canada.</p>

      <hr class="my-2" />

      <div>
        <h2 class="text-lg">## 📌 GitHub Pins</h2>
        <div id="github-pins" class="grid grid-cols-2 gap-1">Loading...</div>
        <div class="text-center">
          🔗 <a class="underline" href="https://github.com/just1ngray?tab=repositories">See more</a>
        </div>
      </div>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
      <script>
        async function getPins() {
          // could deploy this to jpgray.ca if it presents any reliability issues
          const res = await fetch("https://pinned.berrysauce.dev/get/just1ngray");
          const data = await res.json();
          return data;
        }

        function pin2html(pin) {
          return `
            <a
              class="p-2 rounded hover:bg-white/10 duration-200 cursor-pointer"
              href="https://github.com/${pin.author}/${pin.name}"
            >
              <div class="flex flex-row items-center gap-2">
                <div>${pin.name}</div>
                <div class="text-xs border rounded-lg p-0.5" style="color: ${pin.languageColor};">${pin.language}</div>
              </div>
              <div class="opacity-66">
                ${pin.description}
              </div>
            </a>
          `;
        }

        async function hydrate() {
          const pins = await getPins();
          const html = pins.map(pin2html).join("\n");
          const cleanHtml = DOMPurify.sanitize(html);
          document.getElementById("github-pins").innerHTML = cleanHtml;
        }

        hydrate();
      </script>

      <hr class="my-2" />

      <!-- links -->
      <div class="flex justify-evenly">
        <a href="https://github.com/just1ngray"
          class="
            flex flex-col items-center
            p-2 rounded
            hover:bg-white/10 duration-200 cursor-pointer
          "
        >
          <div>
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
            </svg>
          </div>
          <div>
            GitHub
          </div>
        </a>

        <a href="https://www.linkedin.com/in/justinpgray/"
          class="
            flex flex-col items-center
            p-2 rounded
            hover:bg-white/10 duration-200 cursor-pointer
          "
        >
          <div>
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
              <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"/>
            </svg>
          </div>
          <div>
            LinkedIn
          </div>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
