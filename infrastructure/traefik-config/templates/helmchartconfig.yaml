apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        # auto-upgrade http to https for all ingress
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
    service:
      spec:
        # preserve the real client IP address in headers
        externalTrafficPolicy: Local
