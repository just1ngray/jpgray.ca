repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts

# This "Black Magic" tells the local helm-diff
# "Assume the cluster supports this API, even if it says it doesn't."
apiVersions:
  - collectors.grafana.com/v1alpha1

# This hook runs BEFORE the diff/validation phase.
# It ensures the 'blueprint' is in the cluster so the diff can succeed.
templates:
  crd-setup:
    hooks:
      - events: ["prepare"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - "--server-side"
          - "--force-conflicts"
          - "-f"
          - "https://github.com/grafana/alloy-operator/releases/download/alloy-operator-0.3.14/collectors.grafana.com_alloy.yaml"

releases:
  - name: loki
    chart: grafana/loki
    version: 6.44.0
    namespace: monitoring
    values:
      - ./loki/values.yaml

  # To get the 'admin' password, run: $ kubectl get secret --namespace monitoring grafana -o jsonpath="{.data.admin-password}" | base64 --decode ; echo
  - name: grafana
    chart: grafana/grafana
    version: 10.3.0
    namespace: monitoring
    values:
      - ./grafana/values.yaml

  - name: k8s-monitoring
    chart: grafana/k8s-monitoring
    inherit:
      - template: crd-setup
    version: 3.6.2
    namespace: monitoring
    values:
      - ./k8s-monitoring/values.yaml
