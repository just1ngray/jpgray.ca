# FROM: https://github.com/grafana/alloy-scenarios/blob/main/k8s/logs/k8s-monitoring-values.yml

---
cluster:
  name: jpgray

destinations:
  - name: loki
    type: loki
    url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

# TODO: ENABLE METRICS LATER!
# clusterMetrics:
#   enabled: true

clusterEvents:
  enabled: true
  collector: alloy-logs
  namespaces: [] # all

nodeLogs:
  enabled: true

podLogs:
  enabled: true
  gatherMethod: volumes
  collector: alloy-logs
  labelsToKeep:
    - "app_kubernetes_io_name"
    - "container"
    - "instance"
    - "job"
    - "level"
    - "namespace"
    - "service_name"
    - "service_namespace"
    - "deployment_environment"
    - "deployment_environment_name"
  structuredMetadata:
    pod: pod  # Set structured metadata "pod" from label "pod"

# Collectors
alloy-singleton:
  enabled: false

alloy-metrics:
  enabled: false

alloy-logs:
  enabled: true
  alloy:
    mounts:
      varlog: true
      dockercontainers: true
    clustering:
      enabled: true

alloy-profiles:
  enabled: false

alloy-receiver:
  enabled: false

selfReporting:
  enabled: true
