helmfiles:
  - "*/helmfile.yaml"

releases:
  - name: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.19.1
    namespace: cert-manager
    values:
      - ./cert-manager/cert-manager/values.yaml
    set:
      - name: installCRDs
        value: true
    wait: true

  - name: cluster-issuer
    chart: ./cluster-issuer
    needs:
      - cert-manager/cert-manager
    disableValidation: true

  - name: traefik-config
    chart: ./traefik-config
